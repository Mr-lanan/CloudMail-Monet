# 最终接管旧 cloud-mail 数据时使用的示例。
# 请先备份旧 D1；填入真实资源信息后，仅在本地或私有仓库使用。
name = "cloudmail-monet-full"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = "YOUR_EXISTING_D1_NAME"
database_id = "YOUR_EXISTING_D1_ID"

[[kv_namespaces]]
binding = "kv"
id = "YOUR_EXISTING_KV_ID"

[[r2_buckets]]
binding = "r2"
bucket_name = "YOUR_EXISTING_R2_BUCKET"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]

[vars]
orm_log = false
project_link = false
# domain = ["282520.xyz"]
# admin = "YOUR_ADMIN@282520.xyz"
